kind = "web"
previewPath = "/"
title = "FunLand MC"
version = "1.0.0"
id = "artifacts/funland-mc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18236

[services.development]
run = "pnpm --filter @workspace/funland-mc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/funland-mc", "run", "build" ]
publicDir = "artifacts/funland-mc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18236"
BASE_PATH = "/"
